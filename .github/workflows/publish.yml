name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Perform a dry run (no actual publish)'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build packages
        run: npm run build

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify package versions match tag
        run: |
          TAG_VERSION=${{ steps.version.outputs.version }}
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) doesn't match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish to npm (dry run)
        if: github.event.inputs.dry_run == 'true'
        run: |
          npm publish -w @tipstream/sdk-core --access public --dry-run
          npm publish -w @tipstream/sdk-security --access public --dry-run
          npm publish -w @tipstream/sdk-metrics --access public --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        run: |
          npm publish -w @tipstream/sdk-core --access public
          npm publish -w @tipstream/sdk-security --access public
          npm publish -w @tipstream/sdk-metrics --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          registry-url: 'https://npm.pkg.github.com'
          scope: '@tipstream'

      - name: Publish to GitHub Packages
        if: github.event.inputs.dry_run != 'true'
        run: |
          npm publish -w @tipstream/sdk-core --access public || true
          npm publish -w @tipstream/sdk-security --access public || true
          npm publish -w @tipstream/sdk-metrics --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        run: npm run sbom || true

      - name: Create GitHub Release
        if: github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## @tipstream/sdk v${{ steps.version.outputs.version }}
            
            ### Installation
            
            ```bash
            npm install @tipstream/sdk-core@${{ steps.version.outputs.version }}
            npm install @tipstream/sdk-security@${{ steps.version.outputs.version }}
            npm install @tipstream/sdk-metrics@${{ steps.version.outputs.version }}
            ```
            
            See [CHANGELOG.md](CHANGELOG.md) for details.
          files: |
            sbom/sbom.json
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Publishing failed for v${{ steps.version.outputs.version }}"
